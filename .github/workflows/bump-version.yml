name: Bump minor version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump minor version
        run: |
          # Read current version from __init__.py
          CURRENT=$(grep -oP '__plugin_version__ = "\K[0-9]+\.[0-9]+\.[0-9]+' octoprint_octoheat/__init__.py)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}.0"

          echo "Bumping version: ${CURRENT} -> ${NEW_VERSION}"

          # Update __init__.py
          sed -i "s/__plugin_version__ = \"${CURRENT}\"/__plugin_version__ = \"${NEW_VERSION}\"/" octoprint_octoheat/__init__.py

          # Update setup.py
          sed -i "s/plugin_version = \"${CURRENT}\"/plugin_version = \"${NEW_VERSION}\"/" setup.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Bump version [skip ci]"
          git push
