name: Bump minor version

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: bump-version
  cancel-in-progress: true

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'Bump version')"
    steps:
      - uses: actions/checkout@v5

      - name: Bump minor version
        run: |
          # Sync with remote first
          git fetch origin main
          git reset --hard origin/main

          # Read current version
          CURRENT=$(grep -oP '__plugin_version__ = "\K[0-9]+\.[0-9]+\.[0-9]+' octoprint_octoheat/__init__.py)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}.0"

          echo "Bumping version: ${CURRENT} -> ${NEW_VERSION}"

          sed -i "s/__plugin_version__ = \"${CURRENT}\"/__plugin_version__ = \"${NEW_VERSION}\"/" octoprint_octoheat/__init__.py
          sed -i "s/plugin_version = \"${CURRENT}\"/plugin_version = \"${NEW_VERSION}\"/" setup.py

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Bump version [skip ci]"
          git push
